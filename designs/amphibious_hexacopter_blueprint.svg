<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Autonomous heavy-lift amphibious gas-electric hybrid agricultural hexacopter drone blueprint</title>
  <desc id="desc">Technical blueprint schematic showing a six-arm agricultural watering drone with hybrid generator, avionics bay, water tank, pontoons, pump, spray nozzles, and GNSS mast.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c6f95" stroke-width="1" opacity="0.35"/>
      <path d="M 10 0 L 10 40 M 20 0 L 20 40 M 30 0 L 30 40 M 0 10 L 40 10 M 0 20 L 40 20 M 0 30 L 40 30" fill="none" stroke="#14506e" stroke-width="0.5" opacity="0.24"/>
    </pattern>
    <linearGradient id="carbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121a1f"/>
      <stop offset="0.45" stop-color="#35424b"/>
      <stop offset="0.55" stop-color="#0b1115"/>
      <stop offset="1" stop-color="#46545c"/>
    </linearGradient>
    <linearGradient id="aluminum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7f8c95"/>
      <stop offset="0.25" stop-color="#d8e0e4"/>
      <stop offset="0.55" stop-color="#8b969e"/>
      <stop offset="1" stop-color="#f2f6f7"/>
    </linearGradient>
    <linearGradient id="poly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4fd0ff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#092b3c" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#70e4ff" stop-opacity="0.64"/>
      <stop offset="1" stop-color="#1477a1" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8eeaff"/>
    </marker>
    <style>
      .bg { fill: #061925; }
      .sheet { fill: url(#grid); }
      .frame { fill: none; stroke: #8eeaff; stroke-width: 2; opacity: 0.9; }
      .thin { fill: none; stroke: #6ed7ee; stroke-width: 1.2; opacity: 0.85; }
      .line { fill: none; stroke: #b8f5ff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .heavy { fill: none; stroke: #e8fbff; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #7adff2; stroke-width: 1.4; stroke-dasharray: 8 8; opacity: 0.82; }
      .call { fill: none; stroke: #8eeaff; stroke-width: 1.6; marker-end: url(#arrow); }
      .txt { font-family: Arial, Helvetica, sans-serif; fill: #dffbff; letter-spacing: 0; }
      .small { font-size: 18px; }
      .med { font-size: 24px; font-weight: 700; }
      .title { font-size: 36px; font-weight: 800; }
      .micro { font-size: 13px; fill: #aeefff; }
      .label { font-size: 15px; fill: #dbfbff; font-weight: 700; }
      .note { font-size: 14px; fill: #aeefff; }
      .metal { fill: url(#aluminum); stroke: #e8fbff; stroke-width: 1.5; }
      .carbon { fill: url(#carbon); stroke: #aeefff; stroke-width: 1.2; }
      .poly { fill: url(#poly); stroke: #8eeaff; stroke-width: 1.4; }
      .water { fill: url(#water); stroke: #dffbff; stroke-width: 1.5; }
      .dark { fill: #101820; stroke: #8eeaff; stroke-width: 1.4; }
      .accent { fill: #ffcc66; stroke: #fff1b8; stroke-width: 1.2; }
      .red { fill: #ff6b66; stroke: #ffd2ce; stroke-width: 1.2; }
      .green { fill: #55e09d; stroke: #caffdf; stroke-width: 1.2; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1200"/>
  <rect class="sheet" x="24" y="24" width="1752" height="1152"/>
  <rect class="frame" x="48" y="48" width="1704" height="1104"/>
  <rect class="thin" x="70" y="88" width="1660" height="1024"/>
  <text class="txt title" x="90" y="78">AUTONOMOUS AMPHIBIOUS HYBRID TREE-FARM WATERING HEXACOPTER</text>
  <text class="txt small" x="91" y="108">Industrial-grade concept schematic | gas-electric 5-6 kW generator | 5 gal baffled tank | dual stepped pontoons | targeted prop-wash spray delivery</text>
  <text class="txt micro" x="1390" y="74">SHEET A-01 | NOT FOR FLIGHT | CONCEPT CAD BLUEPRINT</text>

  <!-- Top plan view -->
  <g id="top-plan" transform="translate(500 475)">
    <text class="txt med" x="-395" y="-355">TOP PLAN - SYMMETRICAL HEAVY-LIFT HEXACOPTER</text>
    <circle cx="0" cy="0" r="126" class="dark"/>
    <circle cx="0" cy="0" r="88" class="metal"/>
    <circle cx="0" cy="0" r="50" class="water"/>
    <text class="txt label" x="-58" y="-6">CoG / TANK</text>
    <text class="txt micro" x="-51" y="16">lowest mass point</text>

    <!-- Arms generated manually at 60 degree increments -->
    <g id="arms">
      <g transform="rotate(0)">
        <rect class="carbon" x="90" y="-16" width="300" height="32" rx="16"/>
        <path class="dash" d="M120 0 H370"/>
        <circle class="dark" cx="430" cy="0" r="52"/>
        <ellipse class="carbon" cx="430" cy="0" rx="155" ry="22"/>
        <ellipse class="carbon" cx="430" cy="0" rx="22" ry="155"/>
        <circle class="metal" cx="430" cy="0" r="34"/>
        <circle class="red" cx="430" cy="42" r="10"/>
        <path class="line" d="M210 18 C270 50 330 68 420 82"/>
        <circle class="accent" cx="430" cy="82" r="10"/>
      </g>
      <g transform="rotate(60)">
        <rect class="carbon" x="90" y="-16" width="300" height="32" rx="16"/>
        <path class="dash" d="M120 0 H370"/>
        <circle class="dark" cx="430" cy="0" r="52"/>
        <ellipse class="carbon" cx="430" cy="0" rx="155" ry="22"/>
        <ellipse class="carbon" cx="430" cy="0" rx="22" ry="155"/>
        <circle class="metal" cx="430" cy="0" r="34"/>
        <circle class="red" cx="430" cy="42" r="10"/>
        <path class="line" d="M210 18 C270 50 330 68 420 82"/>
        <circle class="accent" cx="430" cy="82" r="10"/>
      </g>
      <g transform="rotate(120)">
        <rect class="carbon" x="90" y="-16" width="300" height="32" rx="16"/>
        <path class="dash" d="M120 0 H370"/>
        <circle class="dark" cx="430" cy="0" r="52"/>
        <ellipse class="carbon" cx="430" cy="0" rx="155" ry="22"/>
        <ellipse class="carbon" cx="430" cy="0" rx="22" ry="155"/>
        <circle class="metal" cx="430" cy="0" r="34"/>
        <circle class="red" cx="430" cy="42" r="10"/>
        <path class="line" d="M210 18 C270 50 330 68 420 82"/>
        <circle class="accent" cx="430" cy="82" r="10"/>
      </g>
      <g transform="rotate(180)">
        <rect class="carbon" x="90" y="-16" width="300" height="32" rx="16"/>
        <path class="dash" d="M120 0 H370"/>
        <circle class="dark" cx="430" cy="0" r="52"/>
        <ellipse class="carbon" cx="430" cy="0" rx="155" ry="22"/>
        <ellipse class="carbon" cx="430" cy="0" rx="22" ry="155"/>
        <circle class="metal" cx="430" cy="0" r="34"/>
        <circle class="red" cx="430" cy="42" r="10"/>
        <path class="line" d="M210 18 C270 50 330 68 420 82"/>
        <circle class="accent" cx="430" cy="82" r="10"/>
      </g>
      <g transform="rotate(240)">
        <rect class="carbon" x="90" y="-16" width="300" height="32" rx="16"/>
        <path class="dash" d="M120 0 H370"/>
        <circle class="dark" cx="430" cy="0" r="52"/>
        <ellipse class="carbon" cx="430" cy="0" rx="155" ry="22"/>
        <ellipse class="carbon" cx="430" cy="0" rx="22" ry="155"/>
        <circle class="metal" cx="430" cy="0" r="34"/>
        <circle class="red" cx="430" cy="42" r="10"/>
        <path class="line" d="M210 18 C270 50 330 68 420 82"/>
        <circle class="accent" cx="430" cy="82" r="10"/>
      </g>
      <g transform="rotate(300)">
        <rect class="carbon" x="90" y="-16" width="300" height="32" rx="16"/>
        <path class="dash" d="M120 0 H370"/>
        <circle class="dark" cx="430" cy="0" r="52"/>
        <ellipse class="carbon" cx="430" cy="0" rx="155" ry="22"/>
        <ellipse class="carbon" cx="430" cy="0" rx="22" ry="155"/>
        <circle class="metal" cx="430" cy="0" r="34"/>
        <circle class="red" cx="430" cy="42" r="10"/>
        <path class="line" d="M210 18 C270 50 330 68 420 82"/>
        <circle class="accent" cx="430" cy="82" r="10"/>
      </g>
    </g>

    <path class="thin" d="M-176 -102 L176 102 M-176 102 L176 -102 M0 -206 V206 M-206 0 H206"/>
    <path class="heavy" d="M-230 310 C-90 265 90 265 230 310"/>
    <path class="heavy" d="M-230 -310 C-90 -265 90 -265 230 -310"/>
    <text class="txt note" x="-288" y="342">dual carbon fiber flotation pontoons, wide-set</text>
    <text class="txt note" x="-300" y="-333">aerodynamic pontoon top surfaces clear downwash</text>
  </g>

  <!-- Exploded vertical stack -->
  <g id="exploded-stack" transform="translate(1235 225)">
    <text class="txt med" x="-120" y="-70">EXPLODED POWER + PAYLOAD STACK</text>
    <line class="dash" x1="0" y1="-36" x2="0" y2="620"/>
    <rect class="carbon" x="-12" y="-170" width="24" height="140" rx="12"/>
    <circle class="dark" cx="0" cy="-185" r="16"/>
    <circle class="dark" cx="-32" cy="-150" r="14"/>
    <circle class="dark" cx="32" cy="-150" r="14"/>
    <text class="txt label" x="54" y="-178">15 in carbon mast</text>
    <text class="txt micro" x="54" y="-156">dual RTK-GNSS + telemetry antennas</text>

    <g transform="translate(0 0)">
      <rect class="dark" x="-150" y="-40" width="300" height="120" rx="18"/>
      <path class="metal" d="M-130 20 C-108 -44 108 -44 130 20 L130 74 L-130 74 Z"/>
      <path class="line" d="M-80 -14 h110 c42 0 78 21 98 52"/>
      <path class="accent" d="M-28 -34 C-16 -80 40 -78 52 -36 C24 -48 -2 -48 -28 -34 Z"/>
      <path class="red" d="M104 -6 C172 -22 196 -40 230 -76"/>
      <text class="txt label" x="-92" y="28">5-6 kW hybrid generator</text>
      <text class="txt micro" x="-96" y="52">forced-air shroud, upward snorkel, raised exhaust</text>
    </g>

    <g transform="translate(0 150)">
      <rect class="metal" x="-170" y="-26" width="340" height="52" rx="7"/>
      <path class="dash" d="M-145 0 H145"/>
      <text class="txt label" x="-132" y="7">CNC aluminum firewall + Faraday cage</text>
    </g>

    <g transform="translate(0 285)">
      <rect class="poly" x="-160" y="-65" width="320" height="130" rx="18"/>
      <rect class="dark" x="-132" y="-42" width="94" height="38" rx="6"/>
      <rect class="dark" x="38" y="-42" width="94" height="38" rx="6"/>
      <circle class="green" cx="-92" cy="30" r="16"/>
      <rect class="accent" x="-30" y="12" width="60" height="34" rx="8"/>
      <text class="txt label" x="-95" y="-13">sealed avionics bay</text>
      <text class="txt micro" x="-122" y="82">flight controller, HV regulators, buffer LiPo dry drawers</text>
    </g>

    <g transform="translate(0 455)">
      <rect class="water" x="-190" y="-70" width="380" height="140" rx="28"/>
      <path class="thin" d="M-140 -60 V60 M-90 -68 V68 M-40 -68 V68 M10 -68 V68 M60 -68 V68 M110 -60 V60"/>
      <path class="thin" d="M-180 -35 H180 M-190 0 H190 M-180 35 H180"/>
      <text class="txt label" x="-102" y="-10">5 gal baffled composite water tank</text>
      <text class="txt micro" x="-96" y="17">grid baffles reduce fluid slosh at CoG</text>
    </g>

    <g transform="translate(0 600)">
      <rect class="dark" x="-82" y="-34" width="164" height="68" rx="16"/>
      <circle class="metal" cx="-46" cy="0" r="20"/>
      <circle class="metal" cx="46" cy="0" r="20"/>
      <path class="line" d="M-115 0 H-82 M82 0 H115"/>
      <text class="txt label" x="-123" y="58">ag diaphragm pressure pump</text>
    </g>
  </g>

  <!-- Pontoon detail -->
  <g id="pontoon-detail" transform="translate(295 1005)">
    <text class="txt med" x="-185" y="-160">PONTOON + WATER HARVESTING DETAIL</text>
    <path class="carbon" d="M-205 -82 C-140 -140 160 -138 230 -72 C180 -36 106 -18 18 -18 C-76 -18 -160 -38 -205 -82 Z"/>
    <path class="water" d="M-205 -18 H245 C222 42 184 72 124 84 H-84 C-148 74 -188 38 -205 -18 Z"/>
    <path class="heavy" d="M16 -18 L-5 62"/>
    <text class="txt micro" x="-3" y="79">step 1-2 cm behind loaded CoG</text>
    <rect class="dark" x="148" y="30" width="94" height="44" rx="12"/>
    <circle class="metal" cx="166" cy="52" r="12"/>
    <path class="thin" d="M154 38 L230 70 M154 70 L230 38 M192 31 V75"/>
    <path class="line" d="M242 52 C292 48 330 24 356 -12"/>
    <polygon class="green" points="350,-22 382,-12 350,-2"/>
    <text class="txt note" x="278" y="22">dual-stage marine filter pump</text>
    <text class="txt micro" x="278" y="44">coarse mesh + one-way check valve</text>
  </g>

  <!-- Callouts and legend -->
  <g id="callouts">
    <path class="call" d="M855 210 C890 150 940 112 1058 98"/>
    <text class="txt label" x="690" y="214">01 Massive 28 in carbon propellers</text>
    <path class="call" d="M285 230 C390 210 450 300 500 475"/>
    <text class="txt label" x="100" y="224">02 Hollow carbon booms route motor wiring internally</text>
    <path class="call" d="M950 475 C1030 434 1070 375 1080 286"/>
    <text class="txt label" x="806" y="510">03 six solenoid nozzles aligned in prop wash</text>
    <path class="call" d="M1444 65 C1396 84 1320 63 1235 40"/>
    <text class="txt label" x="1435" y="102">04 GNSS mast isolated from ignition EMI</text>
    <path class="call" d="M1480 260 C1438 264 1398 252 1360 226"/>
    <text class="txt label" x="1480" y="264">05 upward snorkel splash guard</text>
    <path class="call" d="M1480 322 C1436 310 1410 300 1373 286"/>
    <text class="txt label" x="1480" y="325">06 exhaust exits up/out away from downwash</text>
    <path class="call" d="M1480 450 C1415 420 1370 384 1250 375"/>
    <text class="txt label" x="1480" y="454">07 sealed avionics + dry drawer buffer pack</text>
    <path class="call" d="M1480 642 C1408 604 1348 565 1230 546"/>
    <text class="txt label" x="1480" y="646">08 baffled 5 gallon composite tank at lowest CoG</text>
    <path class="call" d="M1480 777 C1376 762 1310 797 1235 825"/>
    <text class="txt label" x="1480" y="781">09 diaphragm pressure pump under tank</text>
  </g>

  <g id="legend" transform="translate(1140 940)">
    <rect class="dark" x="0" y="0" width="560" height="150" rx="10"/>
    <text class="txt med" x="22" y="36">MATERIAL / SYSTEM LEGEND</text>
    <rect class="carbon" x="24" y="56" width="52" height="18"/><text class="txt note" x="92" y="71">woven carbon fiber: booms, propellers, pontoons, mast</text>
    <rect class="metal" x="24" y="84" width="52" height="18"/><text class="txt note" x="92" y="99">CNC aluminum: firewall, motor mounts, pump hardware</text>
    <rect class="poly" x="24" y="112" width="52" height="18"/><text class="txt note" x="92" y="127">sealed polycarbonate: avionics enclosure and EMI windows</text>
  </g>

  <g id="title-block" transform="translate(78 1118)">
    <text class="txt micro">Design intent: autonomous amphibious tree-farm watering drone. Include waterproofing, EMI isolation, pump serviceability, and prop-wash atomization in next CAD iteration.</text>
    <text class="txt micro" x="1050" y="0">Drawn by OpenClaw/Jennie | Rev 0.1 concept schematic</text>
  </g>
</svg>
